services:
  minio:
    image: minio/minio:latest
    container_name: hallucination-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: hallucination-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MC_HOST_local=http://minio:minio123@minio:9000
    entrypoint: >
      /bin/sh -c "
        mc mb local/vihallu-mlflow --ignore-existing;
        mc mb local/vihallu-dvc    --ignore-existing;
        mc anonymous set download local/vihallu-mlflow;
        echo 'Buckets ready.';
      "
    networks:
      - ai-network

  db:
    image: postgres:15
    container_name: hallucination-postgres
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mlflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  mlflow:
    container_name: hallucination-mlflow
    build:
      context: mlops/mlflow
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      - DB_USER=user
      - DB_PASS=password
      - DB_HOST=db
      - DB_NAME=mlflow
      - MLFLOW_S3_BUCKET=vihallu-mlflow
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_WORKERS=2
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    container_name: hallucination-backend
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_MODEL_NAME=vihallu-detector
      - MLFLOW_MODEL_ALIAS=production
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=hallucination-backend
    ports:
      - "8000:8080"
    volumes:
      - ./models:/app/models
      - ./backend:/app/backend
      - ~/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - ai-network

  frontend:
    container_name: hallucination-frontend
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - ai-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: hallucination-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.0
    container_name: hallucination-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki/loki-local.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.0
    container_name: hallucination-promtail
    volumes:
      - ./observability/loki/promtail-local.yaml:/etc/promtail/promtail.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail.yaml
    depends_on:
      - loki
    networks:
      - ai-network

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: hallucination-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=10000
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.0
    container_name: hallucination-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  evidently:
    container_name: hallucination-evidently
    build:
      context: ./observability/evidently
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "8001:8001"
    environment:
      - REFERENCE_DATA_PATH=/data/vihallu_infer_predictions.csv
      - CURRENT_DATA_PATH=/data/current_predictions.csv
      - REPORT_OUTPUT_DIR=/reports
      - DRIFT_CHECK_INTERVAL_SEC=300
    volumes:
      - ./predictions:/data:ro
      - evidently_reports:/reports
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  ci:
    container_name: hallucination-ci
    build:
      context: .
      dockerfile: docker/Dockerfile.ci
    environment:
      - DISABLE_MODEL=true
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - .:/workspace
    command: >
      pytest tests/unit
      --cov=backend
      --cov-report=xml:/workspace/coverage.xml
      --cov-report=term-missing
    networks:
      - ai-network
    depends_on:
      - mlflow
  jenkins:
    build:
      context: .
      dockerfile: docker/Dockerfile.jenkins
    container_name: hallucination-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.kube:/root/.kube:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      - USE_GKE_GCLOUD_AUTH_PLUGIN=True
      - KUBECONFIG=/root/.kube/config
    networks:
      - ai-network
    restart: unless-stopped

  nginx-gateway:
      build:
        context: .
        dockerfile: docker/Dockerfile.nginx
      container_name: hallucination-nginx
      ports:
        - "80:80"
      depends_on:
        - backend
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        - ./nginx/api_keys.conf:/etc/nginx/api_keys.conf:ro
        - nginx_logs:/var/log/nginx
      networks:
        - ai-network
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "nginx", "-t"]
        interval: 30s
        timeout: 10s
        retries: 3

volumes:
  jenkins_home:
  nginx_logs:
  postgres_data:
  minio_data:
  grafana_data:
  prometheus_data:
  loki_data:
  evidently_reports:

networks:
  ai-network:
    driver: bridge

