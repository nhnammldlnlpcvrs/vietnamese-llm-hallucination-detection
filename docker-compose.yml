services:
  minio:
    image: minio/minio:latest
    container_name: hallucination-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: hallucination-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MC_HOST_local=http://minio:minio123@minio:9000
    entrypoint: >
      /bin/sh -c "
        mc mb local/vihallu-mlflow --ignore-existing;
        mc mb local/vihallu-dvc    --ignore-existing;
        mc anonymous set download local/vihallu-mlflow;
        echo 'Buckets ready.';
      "
    networks:
      - ai-network

  db:
    image: postgres:15
    container_name: hallucination-postgres
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mlflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  mlflow:
    container_name: hallucination-mlflow
    build:
      context: .
      dockerfile: mlops/mlflow/Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      - DB_USER=user
      - DB_PASS=password
      - DB_HOST=db
      - DB_NAME=mlflow
      - MLFLOW_S3_BUCKET=vihallu-mlflow
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_WORKERS=2
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    container_name: hallucination-backend
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      # MLflow
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_MODEL_NAME=vihallu-detector
      - MLFLOW_MODEL_ALIAS=production
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./backend:/app/backend
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - ai-network

  frontend:
    container_name: hallucination-frontend
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - ai-network

  prometheus:
    image: prom/prometheus:latest
    container_name: hallucination-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - "9090:9090"
    networks:
      - ai-network

  grafana:
    image: grafana/grafana:latest
    container_name: hallucination-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ai-network

  ci:
    container_name: hallucination-ci
    build:
      context: .
      dockerfile: docker/Dockerfile.ci
    environment:
      - DISABLE_MODEL=true
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - .:/workspace
    command: >
      pytest tests/unit
      --cov=backend
      --cov-report=xml:/workspace/coverage.xml
      --cov-report=term-missing
    networks:
      - ai-network
    depends_on:
      - mlflow

volumes:
  postgres_data:
  minio_data:
  grafana_data:

networks:
  ai-network:
    driver: bridge