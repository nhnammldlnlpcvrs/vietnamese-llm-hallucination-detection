apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DISABLE_MODEL
              value: "{{ .Values.env.DISABLE_MODEL }}"
            - name: MODEL_PATH
              value: "/app/models/phobert_finetuned_model"
          resources:
            limits:
              memory: "2Gi"
              cpu: "1"