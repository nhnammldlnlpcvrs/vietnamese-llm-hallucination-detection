# kubernetes/charts/hallucination-backend/values.yaml
replicaCount: 2

image:
  repository: ghcr.io/nhnammldlnlpcvrs/hallucination-backend
  tag: "2026.02.06"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

secrets:
  create: false

env:
  LOG_LEVEL: info
  KSERVE_MODEL_NAME: hallucination-detector
  KSERVE_NAMESPACE: hallucination-prod
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70