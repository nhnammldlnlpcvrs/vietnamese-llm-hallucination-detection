# kubernetes/charts/hallucination-model/values.yaml
model:
  name: hallucination-detector
  runtime: mlflow-runtime

  # storageUri: resolved by scripts/resolve_storage_uri.py before deploy
  # Format: s3://bucket/artifacts/<experiment_id>/<run_id>/artifacts/model
  storageUri: "s3://vihallu-mlflow/artifacts/1"

  # Scale-to-zero via Knative
  minReplicas: 0
  maxReplicas: 3
  scaleTarget: 10
  scaleToZeroGracePeriod: "120s"

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"