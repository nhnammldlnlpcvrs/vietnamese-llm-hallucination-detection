# kubernetes/values/backend-prod.yaml
replicaCount: 2

image:
  repository: ghcr.io/nhnammldlnlpcvrs/hallucination-backend
  tag: "2026.02.06"
  pullPolicy: IfNotPresent

service:
  port: 8000

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  ENVIRONMENT: production
  LOG_LEVEL: info
