# kubernetes/ingress-auth.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hallucination-secure-gateway
  namespace: hallucination-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: ingress-auth
    nginx.ingress.kubernetes.io/auth-realm: "Vui lòng nhập tài khoản để dùng LLM"
    nginx.ingress.kubernetes.io/rewrite-target: /v1/models/hallucination-detector:predict
spec:
  rules:
  - http:
      paths:
      - path: /predict
        pathType: Prefix
        backend:
          service:
            name: istio-ingressgateway
            port:
              number: 80