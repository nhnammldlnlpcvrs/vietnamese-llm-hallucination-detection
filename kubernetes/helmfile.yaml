# kubernetes/helmfile.yaml
environments:
  prod:
    values:
      - values/platform-prod.yaml

helmDefaults:
  wait: true
  timeout: 600
  atomic: true

helmfiles:
  - path: helmfiles/backend.yaml
    values:
      - values/platform-prod.yaml

  - path: helmfiles/model.yaml
    values:
      - values/platform-prod.yaml