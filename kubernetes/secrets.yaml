# kubernetes/secrets.yaml

---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-secret
  namespace: hallucination-prod
type: Opaque
stringData:
  MLFLOW_TRACKING_URI: "http://mlflow.hallucination-prod.svc.cluster.local:5000"
  MLFLOW_S3_ENDPOINT_URL: "http://minio.hallucination-prod.svc.cluster.local:9000"
  MLFLOW_MODEL_NAME: "vihallu-detector"
  MLFLOW_MODEL_ALIAS: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: gcs-credentials
  namespace: hallucination-prod
type: Opaque
stringData:
  key.json: |
    {
      "type": "service_account",
      "project_id": "YOUR_PROJECT_ID",
      "private_key_id": "YOUR_KEY_ID",
      "private_key": "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n",
      "client_email": "kserve-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com",
      "client_id": "YOUR_CLIENT_ID",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "..."
    }