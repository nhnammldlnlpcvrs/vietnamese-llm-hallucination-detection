# kubernetes/secrets.yaml
# Apply BEFORE deploying any workloads:
#   kubectl apply -f kubernetes/secrets.yaml
#
# For production: use Sealed Secrets or External Secrets Operator
# instead of storing plaintext values here.

---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-secret
  namespace: hallucination-prod
type: Opaque
stringData:
  MLFLOW_TRACKING_URI: "http://mlflow.hallucination-prod.svc.cluster.local:5000"
  MLFLOW_S3_ENDPOINT_URL: "http://minio.hallucination-prod.svc.cluster.local:9000"
  MLFLOW_MODEL_NAME: "vihallu-detector"
  MLFLOW_MODEL_ALIAS: "production"

---

apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: hallucination-prod
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "minio"
  AWS_SECRET_ACCESS_KEY: "minio123"
  AWS_DEFAULT_REGION: "ap-southeast-1"

---

apiVersion: v1
kind: Secret
metadata:
  name: mlflow-secret
  namespace: monitoring
type: Opaque
stringData:
  MLFLOW_TRACKING_URI: "http://mlflow.hallucination-prod.svc.cluster.local:5000"
  MLFLOW_S3_ENDPOINT_URL: "http://minio.hallucination-prod.svc.cluster.local:9000"