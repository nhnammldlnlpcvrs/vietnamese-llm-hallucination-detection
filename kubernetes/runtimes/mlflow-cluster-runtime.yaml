# kubernetes/runtimes/mlflow-cluster-runtime.yaml
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: mlflow-runtime
spec:
  imagePullSecrets:
    - name: ghcr-secret

  supportedModelFormats:
    - name: mlflow
      version: "1"
      autoSelect: true

  protocolVersions:
    - v2

  containers:
    - name: kserve-container
      image: ghcr.io/kserve/mlserver:v1.3.5
      args:
        - --model_dir=/mnt/models
        - --port=8080
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
