# mlops/kserve/inference-service.yaml

apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: hallucination-detector
  namespace: hallucination-prod
spec:
  predictor:
    model:
      modelFormat:
        name: mlflow
        version: "1"
      runtime: mlflow-runtime
      storageUri: "gs://vihallu-models/hallucination-detector/model"
      resources:
        requests:
          cpu: "500m"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
      env:
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-secret
              key: MLFLOW_TRACKING_URI
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/google/key.json
      volumeMounts:
        - name: gcs-key
          mountPath: /var/secrets/google
      readinessProbe:
        httpGet:
          path: /v2/health/ready
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 10
      livenessProbe:
        httpGet:
          path: /v2/health/live
          port: 8080
        initialDelaySeconds: 60
        periodSeconds: 30
  
  volumes:
    - name: gcs-key
      secret:
        secretName: gcs-credentials