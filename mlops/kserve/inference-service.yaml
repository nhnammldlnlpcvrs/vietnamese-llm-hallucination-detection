# mlops/kserve/inference-service.yaml
# KServe InferenceService for Vietnamese Hallucination Detector
# Uses MLflow pyfunc model served via mlserver
# Supports scale-to-zero (minReplicas: 0)

apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: hallucination-detector
  namespace: hallucination-prod
  annotations:
    # Knative scale-to-zero
    autoscaling.knative.dev/minScale: "0"
    autoscaling.knative.dev/maxScale: "3"
    autoscaling.knative.dev/target: "10"
    autoscaling.knative.dev/scaleToZeroGracePeriod: "120s"
spec:
  predictor:
    # Use ClusterServingRuntime mlflow-runtime
    model:
      modelFormat:
        name: mlflow
        version: "1"
      runtime: mlflow-runtime
      # Pull model from MLflow Registry via alias
      storageUri: "s3://vihallu-mlflow/artifacts/1/56e1f203b45f4f85beac11fba00d9a5e/artifacts/model"
      resources:
        requests:
          cpu: "500m"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
      env:
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-secret
              key: MLFLOW_TRACKING_URI
        - name: MLFLOW_S3_ENDPOINT_URL
          valueFrom:
            secretKeyRef:
              name: mlflow-secret
              key: MLFLOW_S3_ENDPOINT_URL
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_SECRET_ACCESS_KEY
      readinessProbe:
        httpGet:
          path: /v2/health/ready
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 10
      livenessProbe:
        httpGet:
          path: /v2/health/live
          port: 8080
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 5