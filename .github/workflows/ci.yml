name: CI Pipeline

on:
  push:
    branches:
      - "feature*"
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test (Docker CI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build CI Docker image
        run: |
          docker build \
            -f docker/Dockerfile.ci \
            -t hallucination-ci .

      - name: Run unit tests (model disabled)
        run: |
          docker run --rm \
            -e DISABLE_MODEL=true \
            -v ${{ github.workspace }}:/workspace \
            hallucination-ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build & Push Serving Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image (Serving)
        run: |
          IMAGE=nhnammldlnlpcvrs/vietnamese-llm-hallucination-detection

          docker build -f docker/Dockerfile.serving -t $IMAGE:${{ github.sha }} .
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest

          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest