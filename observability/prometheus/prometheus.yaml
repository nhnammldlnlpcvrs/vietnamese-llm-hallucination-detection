global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "hallucination-backend"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: "hallucination-backend"

  - job_name: "evidently-drift"
    metrics_path: "/metrics"
    scrape_interval: 60s
    static_configs:
      - targets: ["evidently:8001"]
        labels:
          service: "evidently"

  - job_name: "jaeger"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["jaeger:14269"]
        labels:
          service: "jaeger"