events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=predict_limit:10m rate=10r/m;

    map $http_x_api_key $api_key_valid {
        default                  0;
        "vihallu-internal-2026"  1;
        "vihallu-jenkins-cd-key" 1;
        "vihallu-dev-key-local"  1;
    }

    log_format api_log '$remote_addr | $time_iso8601 | $request_method $uri | status=$status | ${request_time}s';
    access_log /var/log/nginx/api_access.log api_log;
    error_log  /var/log/nginx/api_error.log warn;

    server {
        listen 80;
        server_name _;

        # Docker internal DNS resolver
        resolver 127.0.0.11 valid=30s;
        set $backend_host "backend:8080";

        location /health {
            proxy_pass http://$backend_host/health;
            proxy_set_header Host $host;
        }

        location /metrics {
            proxy_pass http://$backend_host/metrics;
            proxy_set_header Host $host;
        }

        location /api/predict {
            if ($api_key_valid = 0) {
                return 401 '{"error":"Invalid or missing API key. Pass key in X-API-Key header."}';
            }
            limit_req zone=predict_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://$backend_host/api/predict;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 1800s;
            add_header Content-Type "application/json" always;
        }

        location /api/ {
            if ($api_key_valid = 0) {
                return 401 '{"error":"Invalid or missing API key. Pass key in X-API-Key header."}';
            }
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://$backend_host/api/;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 1800s;
        }

        error_page 429 = @too_many_requests;
        location @too_many_requests {
            default_type application/json;
            return 429 '{"error":"Rate limit exceeded."}';
        }
    }
}
