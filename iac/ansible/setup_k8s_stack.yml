# iac/ansible/setup_k8s_stack.yml
---
- name: Provision MLOps & Observability Stack
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig: "{{ kubeconfig_path | default('~/.kube/config') }}"
    kserve_version: "v0.14.1"
    istio_namespace: istio-system

  tasks:
    - name: Add Helm Repositories
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: "istio", url: "https://istio-release.storage.googleapis.com/charts" }
        - { name: "prometheus-community", url: "https://prometheus-community.github.io/helm-charts" }
        - { name: "grafana", url: "https://grafana.github.io/helm-charts" }
        - { name: "community-charts", url: "https://community-charts.github.io/helm-charts" }
        - { name: "jetstack", url: "https://charts.jetstack.io" }   # FIX

    - name: Update Helm Repositories
      ansible.builtin.command: helm repo update

    - name: Create namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
        state: present
      loop:
        [monitoring, kserve, observability, mlflow, istio-system, cert-manager]

    - name: Install Cert-Manager
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        create_namespace: true
        values:
          installCRDs: true
        wait: true
        timeout: 600s
        atomic: true

    - name: Wait Cert Manager Pods Ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: cert-manager
      register: cert_pods
      until: cert_pods.resources | length > 0
      retries: 12
      delay: 10

    - name: Install Istio (Base & Istiod)
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: "{{ item.name }}"
        chart_ref: "istio/{{ item.chart }}"
        release_namespace: "{{ istio_namespace }}"
        wait: true
        timeout: 600s
        atomic: true
      loop:
        - { name: istio-base, chart: base }
        - { name: istiod, chart: istiod }

    - name: Install Istio Ingress Gateway
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: istio-ingressgateway
        chart_ref: istio/gateway
        release_namespace: "{{ istio_namespace }}"
        wait: true
        timeout: 900s
        atomic: true
      register: gateway_install
      until: gateway_install is succeeded
      retries: 2

    - name: Install KServe Cluster Resources (CRDs & RBAC)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "https://github.com/kserve/kserve/releases/download/{{ kserve_version }}/kserve-cluster-resources.yaml"
        wait: true

    - name: Wait for KServe CRDs to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: inferenceservices.serving.kserve.io
      register: kserve_crd_ready
      until: kserve_crd_ready.resources | length > 0
      retries: 12
      delay: 5

    - name: Install KServe Core (Controllers & Webhooks)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "https://github.com/kserve/kserve/releases/download/{{ kserve_version }}/kserve.yaml"
        wait: true

    - name: Install Observability Stack
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: "{{ item.name }}"
        chart_ref: "{{ item.chart }}"
        release_namespace: observability
        create_namespace: false
        values: "{{ item['values'] | default({}) }}"
        wait: true
        timeout: 600s
        atomic: true
      loop:
        - name: monitoring
          chart: prometheus-community/kube-prometheus-stack
          values:
            grafana: { enabled: true }
            prometheus:
              prometheusSpec:
                serviceMonitorSelectorNilUsesHelmValues: false
        - name: loki
          chart: grafana/loki-stack
          values:
            grafana: { enabled: false }
            promtail: { enabled: true }

    - name: Install MLflow
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: mlflow
        chart_ref: community-charts/mlflow
        release_namespace: mlflow
        create_namespace: false
        wait: true
        timeout: 600s
        atomic: true
        values:
          persistence:
            enabled: true
            size: 5Gi

          service:
            type: ClusterIP