# iac/ansible/setup_k8s_stack.yml
---
- name: Provision MLOps & Observability Stack
  hosts: all
  connection: local
  gather_facts: no

  vars:
    knative_version: v1.10.0
    kserve_version: 0.11.0
    istio_namespace: istio-system

  tasks:
    - name: List all namespaces
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        kind: Namespace
      register: ns_list

    - debug:
        msg: "{{ ns_list.resources | map(attribute='metadata.name') | list }}"

    - name: Add Helm Repositories
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
        state: present
      loop:
        - { name: istio, url: https://istio-release.storage.googleapis.com/charts }
        - { name: prometheus-community, url: https://prometheus-community.github.io/helm-charts }
        - { name: grafana, url: https://grafana.github.io/helm-charts }
        - { name: community-charts, url: https://community-charts.github.io/helm-charts }
        - { name: kserve, url: https://kserve.github.io/charts }

    - name: Install Istio Base & Control Plane
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: "{{ item.name }}"
        chart_ref: "istio/{{ item.chart }}"
        release_namespace: "{{ istio_namespace }}"
        create_namespace: true
        wait: true
      loop:
        - { name: istio-base, chart: base }
        - { name: istiod, chart: istiod }

    - name: Install Knative Serving
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ item }}"
        wait: true
      loop:
        - "https://github.com/knative/serving/releases/download/knative-{{ knative_version }}/serving-crds.yaml"
        - "https://github.com/knative/serving/releases/download/knative-{{ knative_version }}/serving-core.yaml"
        - "https://github.com/knative/net-istio/releases/download/knative-{{ knative_version }}/net-istio.yaml"

    - name: Cleanup legacy KServe CRDs (Tránh xung đột Helm)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        kind: CustomResourceDefinition
        name: "{{ item }}"
      loop:
        - inferenceservices.serving.kserve.io
        - trainedmodels.serving.kserve.io
        - clusterservingruntimes.serving.kserve.io
        - servingruntimes.serving.kserve.io
      ignore_errors: true

    - name: Install KServe CRDs via Helm
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: kserve-crd
        chart_ref: kserve/kserve-crd
        chart_version: "{{ kserve_version }}"
        release_namespace: kserve
        create_namespace: true
        wait: true

    - name: Install KServe Core via Helm
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: kserve
        chart_ref: kserve/kserve
        chart_version: "{{ kserve_version }}"
        release_namespace: kserve
        wait: true
        values:
          kserve:
            controller:
              gateway:
                ingressGateway: istio-ingressgateway
                ingressNamespace: istio-system

    - name: Install kube-prometheus-stack (Monitoring)
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: monitoring
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: observability
        create_namespace: true
        wait: true

    - name: Install Loki-Stack (Logging)
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: loki
        chart_ref: grafana/loki-stack
        release_namespace: observability
        values:
          grafana: { enabled: false }
          prometheus: { enabled: false }

    - name: Install Tempo (Tracing)
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: tempo
        chart_ref: grafana/tempo
        release_namespace: observability
        values:
          grafana: { enabled: false }

    - name: Install MLflow
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: mlflow
        chart_ref: community-charts/mlflow
        release_namespace: mlflow
        create_namespace: true
        values:
          defaultArtifactRoot: "s3://my-mlflow-bucket"