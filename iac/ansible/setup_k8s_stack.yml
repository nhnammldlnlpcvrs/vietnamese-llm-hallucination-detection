# iac/ansible/setup_k8s_stack.yml
---
- name: Provision MLOps & Observability Stack
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig: "{{ kubeconfig_path | default('~/.kube/config') }}"
    kserve_version: "v0.14.1"
    istio_namespace: istio-system

  tasks:
    - name: Add Helm Repositories
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: "istio", url: "https://istio-release.storage.googleapis.com/charts" }
        - { name: "prometheus-community", url: "https://prometheus-community.github.io/helm-charts" }
        - { name: "grafana", url: "https://grafana.github.io/helm-charts" }
        - { name: "community-charts", url: "https://community-charts.github.io/helm-charts" }
        - { name: "jetstack", url: "https://charts.jetstack.io" }

    - name: Update Helm Repositories
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Create MLOps Namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
        state: present
      loop: [monitoring, kserve, observability, mlflow, istio-system]

    - name: Ensure cert-manager namespace is fresh 
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Namespace
        name: cert-manager
        state: "{{ item }}"
      loop: [absent, present]
      ignore_errors: true

    - name: Install Cert-Manager
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        values:
          installCRDs: true
        wait: true
        timeout: 600s
        atomic: true

    - name: Wait for Cert-Manager Pods
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: cert-manager
      register: cert_pods
      until: 
        - cert_pods.resources | length > 0
        - cert_pods.resources | selectattr('status.phase','equalto','Running') | list | length >= 2
      retries: 20
      delay: 10

    - name: Install Istio Base and Istiod
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: "{{ item.name }}"
        chart_ref: "istio/{{ item.chart }}"
        release_namespace: "{{ istio_namespace }}"
        wait: true
        timeout: 600s
      loop:
        - { name: istio-base, chart: base }
        - { name: istiod, chart: istiod }

    - name: Install Istio Ingress Gateway
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: istio-ingressgateway
        chart_ref: istio/gateway
        release_namespace: "{{ istio_namespace }}"
        wait: true
        timeout: 900s

    - name: Enable Istio Sidecar Injection for Default Namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        api_version: v1
        kind: Namespace
        name: default
        definition:
          metadata:
            labels:
              istio-injection: enabled

    - name: Install KServe Cluster Resources
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "https://github.com/kserve/kserve/releases/download/{{ kserve_version }}/kserve-cluster-resources.yaml"

    - name: Wait for KServe CRDs
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: inferenceservices.serving.kserve.io
      register: kserve_crd_ready
      until: kserve_crd_ready.resources | length > 0
      retries: 15
      delay: 5

    - name: Install KServe Core
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        state: present
        src: "https://github.com/kserve/kserve/releases/download/{{ kserve_version }}/kserve.yaml"

    - name: Install Monitoring (Prometheus and Grafana)
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: monitoring
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: observability
        values:
          grafana:
            enabled: true
            service: { type: ClusterIP }
        wait: true
        timeout: 600s

    - name: Install Loki Stack
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: loki
        chart_ref: grafana/loki-stack
        release_namespace: observability
        values:
          grafana: { enabled: false }
          promtail: { enabled: true }

    - name: Install MLflow 
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig }}"
        name: mlflow
        chart_ref: community-charts/mlflow
        release_namespace: mlflow
        values:
          backendStore:
            postgres: { enabled: false }
            mysql: { enabled: false }
          persistence:
            enabled: true
            size: 5Gi
            accessMode: ReadWriteOnce
            mountPath: /mlflow
          defaultArtifactRoot: /mlflow/artifacts
          service:
            type: ClusterIP
        wait: true
        timeout: 600s