# iac/ansible/setup_k8s_stack.yml
---
- name: Provision MLOps & Observability Stack
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig: "{{ kubeconfig_path | default('~/.kube/config') }}"
    kserve_version: "v0.16.0"

  tasks:

  - name: Add Helm Repositories
    kubernetes.core.helm_repository:
      name: "{{ item.name }}"
      repo_url: "{{ item.url }}"
    loop:
      - { name: "istio", url: "https://istio-release.storage.googleapis.com/charts" }
      - { name: "prometheus-community", url: "https://prometheus-community.github.io/helm-charts" }
      - { name: "grafana", url: "https://grafana.github.io/helm-charts" }
      - { name: "community-charts", url: "https://community-charts.github.io/helm-charts" }

  - name: Update Helm Repositories
    ansible.builtin.command: helm repo update

  - name: Create namespaces
    kubernetes.core.k8s:
      kubeconfig: "{{ kubeconfig }}"
      api_version: v1
      kind: Namespace
      name: "{{ item }}"
      state: present
    loop:
      - monitoring
      - kserve
      - observability
      - mlflow
      - istio-system

  - name: Install Istio Base
    kubernetes.core.helm:
      name: istio-base
      chart_ref: istio/base
      release_namespace: istio-system
      kubeconfig: "{{ kubeconfig }}"
      wait: true

  - name: Install Istiod
    kubernetes.core.helm:
      name: istiod
      chart_ref: istio/istiod
      release_namespace: istio-system
      kubeconfig: "{{ kubeconfig }}"
      wait: true

  - name: Install KServe Core
    kubernetes.core.k8s:
      kubeconfig: "{{ kubeconfig }}"
      state: present
      src: "https://github.com/kserve/kserve/releases/download/{{ kserve_version }}/kserve.yaml"

  - name: Install KServe Knative (Optional)
    kubernetes.core.k8s:
      kubeconfig: "{{ kubeconfig }}"
      state: present
      src: "https://github.com/kserve/kserve/releases/download/{{ kserve_version }}/kserve-knative.yaml"
    ignore_errors: true

  - name: Wait for KServe Pods
    ansible.builtin.command: kubectl get pods -n kserve
    register: kserve_pods
    retries: 10
    delay: 15
    until: kserve_pods.rc == 0

  - name: Show KServe Pods
    ansible.builtin.debug:
      var: kserve_pods.stdout

  - name: Install Observability Stack
    kubernetes.core.helm:
      kubeconfig: "{{ kubeconfig }}"
      name: "{{ item.name }}"
      chart_ref: "{{ item.chart }}"
      release_namespace: observability
      create_namespace: false
      values: "{{ item.values | default({}) }}"
      wait: true
      timeout: 600
      atomic: true
    loop:
      - name: monitoring
        chart: prometheus-community/kube-prometheus-stack
        values:
          grafana:
            enabled: true
          prometheus:
            prometheusSpec:
              serviceMonitorSelectorNilUsesHelmValues: false

      - name: loki
        chart: grafana/loki-stack
        values:
          grafana:
            enabled: false
          promtail:
            enabled: true

  - name: Install MLflow
    kubernetes.core.helm:
      kubeconfig: "{{ kubeconfig }}"
      name: mlflow
      chart_ref: community-charts/mlflow
      release_namespace: mlflow
      create_namespace: false
      wait: true
      timeout: 600
      atomic: true
      values:
        backendStore:
          sqlite:
            enabled: true
        artifactRoot:
          pvc:
            enabled: true
            size: 5Gi
        service:
          type: ClusterIP
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"