# iac/ansible/setup_k8s_stack.yml
---
- name: "Provision MLOps & Observability Stack"
  hosts: all
  gather_facts: no
  
  tasks:
    - name: "List all namespaces"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        kind: Namespace
      register: ns_list
    - debug: msg="{{ ns_list | json_query('resources[*].metadata.name') }}"

    - name: "Add Helm Repositories"
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: "istio", url: "https://istio-release.storage.googleapis.com/charts" }
        - { name: "prometheus-community", url: "https://prometheus-community.github.io/helm-charts" }
        - { name: "grafana", url: "https://grafana.github.io/helm-charts" }
        - { name: "community-charts", url: "https://community-charts.github.io/helm-charts" }

    - name: "Install Istio Stack"
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}" 
        name: "{{ item.name }}"
        chart_ref: "istio/{{ item.chart }}"
        release_namespace: istio-system
        create_namespace: true
        wait: true
      loop:
        - { name: "istio-base", chart: "base" }
        - { name: "istiod", chart: "istiod" }

    - name: "Install Knative Serving"
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ item }}"
      loop:
        - https://github.com/knative/serving/releases/download/knative-v1.10.0/serving-crds.yaml
        - https://github.com/knative/serving/releases/download/knative-v1.10.0/serving-core.yaml
        - https://github.com/knative/net-istio/releases/download/knative-v1.10.0/net-istio.yaml

    - name: "Install KServe"
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "https://github.com/kserve/kserve/releases/download/v0.11.0/kserve.yaml"
        wait: no

    - name: "Install Monitoring Stack"
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: monitoring
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: observability
        create_namespace: true
        values:
          grafana:
            additionalDataSources:
              - { name: Loki, type: loki, url: "http://loki-stack.observability:3100" }
              
    - name: "Install Loki & Tempo"
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: "{{ item }}"
        chart_ref: "grafana/{{ item }}"
        release_namespace: observability
        create_namespace: true
      loop:
        - loki-stack
        - tempo

    - name: "Install MLflow via Helm"
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"
        name: mlflow
        chart_ref: community-charts/mlflow
        release_namespace: mlflow
        create_namespace: true
        values:
          defaultArtifactRoot: "s3://my-mlflow-bucket"